<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/style.css">
    <title>Movies Website</title>
</head>

<body>
    <header>
        <h1>Bienvenidos a la web de peliculas</h1>
    </header>
    <main>
        <section id="add-movies">
            <h2>Añadir Nueva Película</h2>
            <form class="form-movies">
                <label for="titulo">Título:</label>
                <input type="text" id="titulo" name="titulo" required>
                
                <label for="anio">Año:</label>
                <input type="number" id="anio" name="anio" required>
                
                <label for="descripcion">Descripción:</label>
                <textarea id="descripcion" name="descripcion" required></textarea>
                
                <label for="urlFoto">URL de la foto:</label>
                <input type="url" id="urlFoto" name="urlFoto" required>
                
                <label for="genero">Género:</label>
                <select id="genero" name="genero" required>
                    <option value="">Selecciona un género</option>
                    <option value="Terror">Terror</option>
                    <option value="Acción">Acción</option>
                    <option value="Comedia">Comedia</option>
                    <option value="Romance">Romance</option>
                </select>
                
                <button type="submit">Añadir película</button>
            </form>
            <div id="errorMessages"></div>
        </section>
        <section class="filtro-combinado">
            <h2>Filtro Combinado</h2>
            <label for="filtroTitulo">Título:</label>
            <input type="text" id="filtroTitulo" name="filtroTitulo" required>

            <label for="filtroGenero">Género:</label>
            <select name="" id="filtroGenero">
                <option value="Todas">Todas</option>
                <option value="Terror">Terror</option>
                <option value="Acción">Acción</option>
                <option value="Comedia">Comedia</option>
                <option value="Romance">Romance</option>
            </select>
        </section>
        <section id="peliculas">
            <article id="pelis-article">
                <table>
                    <!-- <thead>
                        <tr>
                            <th>Título</th>
                            <th>Año</th>
                            <th>Descripción</th>
                            <th>Foto</th>
                            <th>Género</th>
                            <th>Acciones</th>
                        </tr>
                    </thead> -->
                    <tbody class="pelis-lista">
                        <!-- Aquí se insertarán las filas dinámicamente -->
                    </tbody>
                </table>
            </article>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 Movies Project</p>
    </footer>
    <script src="./script.js"></script>
</body>

</html>
